# 秘密値のテンプレート。実値を入れたファイルは **コミットしないこと**。
#   cp secret.example.yaml secret.yaml  して secret.yaml に実値を入れ、kubectl apply する。
#   （secret.yaml は .gitignore 済みであることを確認）
#
# service_role キー: Supabase Dashboard > Project Settings > API > service_role（秘密鍵）
# ADMIN_API_KEY    : 自分で決めるランダム文字列（例: openssl rand -hex 16）。/retrain 保護用。
apiVersion: v1
kind: Secret
metadata:
  name: recommendation-secrets
  namespace: sharekeep
type: Opaque
stringData:
  SUPABASE_SERVICE_ROLE_KEY: "REPLACE_WITH_SERVICE_ROLE_KEY"
  ADMIN_API_KEY: "REPLACE_WITH_RANDOM_ADMIN_KEY"
